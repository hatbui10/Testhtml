<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kiểm tra 3 chữ số</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #1e1e2f, #2b1055);
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 30px;
  min-height: 100vh;
}

.container {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,255,255,0.3);
  text-align: center;
}

h2 {
  color: white;
  margin-bottom: 20px;
}

input {
  padding: 15px;
  font-size: 22px;
  width: 170px;
  text-align: center;
  border-radius: 12px;
  border: none;
  outline: none;
  margin: 8px;
  transition: 0.3s;
}

#numberInput {
  background: #ffffff;
}

#copyInput {
  background: #222;
  color: #00ffff;
  font-weight: bold;
}

#resultInput {
  background: #111;
  color: white;
  font-weight: bold;
  
  font-size: 20px;
  padding: 18px;
  border-radius: 12px;
  margin: 8px;
  display: inline-block;
}



.success {
  box-shadow: 0 0 20px #00ff99;
  background: #00ff99 !important;
  color: black !important;
}

.fail {
  animation: shake 0.3s;
  box-shadow: 0 0 20px #ff0066;
  background: #ff0066 !important;
  color: white !important;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

.qqq {
  margin-top: 20px;
  padding: 18px 25px;
  max-width: 380px;
  border-radius: 16px;

  font-size: 16px;
  font-weight: 600;

  color: #ffcc00;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 204, 0, 0.5);

  box-shadow: 0 0 25px rgba(255, 204, 0, 0.4);
  display: inline-block;
}



</style>
</head>

<div class="container">
